<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visco Product Details</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --primary:#2563eb;
  --primary-dark:#004ac6;
  --secondary:#64748b;
  --bg:#f7f9fb;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --success:#22c55e;
}

*{ margin:0; padding:0; box-sizing:border-box; }

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:100px;
}

.material-symbols-outlined{
  font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:1000;
}

.header-left{ display:flex; align-items:center; gap:14px; }

.back-btn{
  width:42px; height:42px;
  border-radius:50%;
  border:none;
  background:#eef4ff;
  display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:0.2s ease;
}

.back-btn:hover{ transform:scale(1.05); }
.back-btn span{ color:var(--primary-dark); }

.header-title{ font-size:20px; font-weight:700; }

.header-icons{ display:flex; align-items:center; gap:10px; }
.header-icons span{ color:var(--secondary); cursor:pointer; }

.container{
  max-width:1100px;
  margin:auto;
  padding:95px 18px 20px;
}

.loading{ display:flex; flex-direction:column; gap:20px; }

.shimmer{
  border-radius:24px;
  background:linear-gradient(90deg,#f1f5f9 25%,#e2e8f0 50%,#f1f5f9 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}

@keyframes shimmer{
  0%{ background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.hero-card{
  background:var(--card);
  border-radius:30px;
  padding:24px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,0.04);
  position:relative;
  overflow:hidden;
}

.rating-box{
  position:absolute;
  top:18px; right:18px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:8px 14px;
  border-radius:999px;
  display:flex; align-items:center; gap:6px;
  border:1px solid #e2e8f0;
  font-weight:600;
}

.rating-box .material-symbols-outlined{ color:#f59e0b; font-size:20px; }

.product-image-box{
  width:100%;
  aspect-ratio:1/1;
  margin-bottom:24px;
  overflow:hidden;
  display:flex; align-items:center; justify-content:center;
  background:#f8fafc;
  border-radius:24px;
}

.product-image-box img{
  width:100%; height:100%;
  object-fit:contain;
  padding:20px;
  transition:0.4s ease;
}

.product-image-box img:hover{ transform:scale(1.05); }

.brand{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--primary);
  font-weight:700;
  margin-bottom:10px;
}

.product-title{
  font-size:32px;
  line-height:1.3;
  font-weight:800;
}

.price-summary{
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:16px;
}

.summary-pill{
  background:#eef4ff;
  color:var(--primary-dark);
  padding:8px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
}

.price-grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.price-card{
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
  position:relative;
  transition:0.3s ease;
}

.price-card:hover{ transform:translateY(-4px); }

.best-badge{
  position:absolute;
  top:0; right:0;
  background:var(--primary);
  color:white;
  padding:8px 16px;
  border-bottom-left-radius:18px;
  font-size:12px;
  font-weight:700;
}

.store-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.store-name{ font-size:18px; font-weight:700; }

.store-status{
  font-size:13px;
  color:var(--success);
  font-weight:700;
}

.price-label{ color:var(--muted); font-size:14px; margin-bottom:8px; }

.price{
  font-size:42px;
  color:var(--primary-dark);
  font-weight:800;
}

.shop-btn{
  margin-top:22px;
  width:100%;
  border:none;
  background:var(--primary);
  color:white;
  padding:15px;
  border-radius:18px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s ease;
  text-decoration:none;
  display:block;
  text-align:center;
}

.shop-btn:hover{ background:var(--primary-dark); }

.spec-card{
  margin-top:20px;
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
}

.section-title{ font-size:24px; font-weight:700; margin-bottom:20px; }

.spec-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.spec-item{
  background:#f8fafc;
  border:1px solid #edf2f7;
  border-radius:18px;
  padding:16px;
}

.spec-label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:6px;
  font-weight:700;
}

.spec-value{ font-size:15px; font-weight:600; }

.chart-card{
  margin-top:20px;
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
}

.chart-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
  flex-wrap:wrap;
  gap:10px;
}

.chart-tags{ display:flex; gap:15px; flex-wrap:wrap; }

.chart-tag{
  display:flex; align-items:center; gap:6px;
  font-size:13px; font-weight:600;
}

.dot{ width:10px; height:10px; border-radius:50%; }

canvas{ max-height:300px; }

.related-card{
  margin-top:20px;
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
}

.related-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:14px;
}

.related-item{
  background:#f8fafc;
  border:1px solid #edf2f7;
  border-radius:18px;
  padding:12px;
  cursor:pointer;
  transition:0.2s ease;
}

.related-item:hover{ transform:translateY(-4px); border-color:var(--primary); }

.related-item img{
  width:100%; height:120px;
  object-fit:contain;
  background:white;
  border-radius:12px;
  padding:8px;
}

.related-title{
  font-size:13px;
  font-weight:600;
  margin-top:8px;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  min-height:36px;
}

.related-price{
  color:var(--primary-dark);
  font-weight:800;
  font-size:16px;
  margin-top:6px;
}

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:78px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-around;
  align-items:center;
  z-index:50;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  font-size:12px;
  color:#64748b;
  text-decoration:none;
  font-weight:600;
  background:none;
  border:none;
  cursor:pointer;
}

.nav-item.active{ color:var(--primary); }
.nav-item span{ font-size:24px; }

@media(max-width:768px){
  .price-grid{ grid-template-columns:1fr; }
  .spec-grid{ grid-template-columns:1fr; }
  .product-title{ font-size:26px; }
}

</style>
</head>

<body>

<header>

  <div class="header-left">

    <button class="back-btn" onclick="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>

    <div class="header-title">Product Details</div>

  </div>

  <div class="header-icons">
    <span class="material-symbols-outlined" onclick="shareProduct()">share</span>
    <span class="material-symbols-outlined" onclick="location.href='account.html'">person</span>
  </div>

</header>

<div class="container">

  <div class="loading" id="loading">
    <div class="shimmer" style="height:340px;"></div>
    <div class="shimmer" style="height:50px;width:70%;"></div>
    <div class="shimmer" style="height:120px;"></div>
  </div>

  <div id="main-content" style="display:none;"></div>

</div>

<div class="bottom-nav">

  <button class="nav-item" onclick="location.href='homepage.html'">
    <span class="material-symbols-outlined">home</span>
    Home
  </button>

  <button class="nav-item" onclick="location.href='homepage.html'">
    <span class="material-symbols-outlined">search</span>
    Search
  </button>

  <button class="nav-item active">
    <span class="material-symbols-outlined">compare_arrows</span>
    Compare
  </button>

  <button class="nav-item" onclick="location.href='homepage.html'">
    <span class="material-symbols-outlined">local_offer</span>
    Deals
  </button>

  <button class="nav-item" onclick="location.href='account.html'">
    <span class="material-symbols-outlined">person</span>
    Profile
  </button>

</div>

<script>

const API = "https://visco1.onrender.com";
const id  = localStorage.getItem("productId");
let currentProduct = null;

function goBack(){
  if(window.history.length > 1) window.history.back();
  else window.location.href = "homepage.html";
}

async function shareProduct(){
  if(!currentProduct) return;
  const text = `${currentProduct.title} — Best price ₹${currentProduct.lowestPrice} on Visco Compare`;
  if(navigator.share){
    try{ await navigator.share({title: currentProduct.title, text, url: location.href}); }
    catch(e){}
  }else{
    navigator.clipboard.writeText(`${text}\n${location.href}`);
    alert("Link copied!");
  }
}

async function apiGet(path){
  const res = await fetch(API + path);
  const json = await res.json().catch(()=>({}));
  if(!res.ok || !json.success) throw new Error(json.error || "Request failed");
  return json.data;
}

function showError(msg){
  document.getElementById("loading").style.display = "none";
  const main = document.getElementById("main-content");
  main.style.display = "block";
  main.innerHTML = `
    <div style="text-align:center;padding:60px;">
      <div style="font-size:60px;">⚠️</div>
      <div style="color:#ef4444;font-weight:700;font-size:18px;margin-top:12px;">${msg}</div>
      <button onclick="loadProduct()" style="margin-top:20px;background:#2563eb;color:white;border:none;padding:12px 28px;border-radius:14px;font-weight:700;cursor:pointer;">
        Retry
      </button>
    </div>
  `;
}

async function loadProduct(){

  if(!id){
    showError("No product selected");
    return;
  }

  try{

    const p = await apiGet(`/api/product/${encodeURIComponent(id)}`);
    currentProduct = p;

    document.getElementById("loading").style.display = "none";
    document.getElementById("main-content").style.display = "block";

    const offers = p.offers || [];
    const best   = offers[0];

    let priceCards = "";
    offers.forEach((o, idx)=>{
      const badge = idx === 0 ? `<div class="best-badge">BEST VALUE</div>` : "";
      priceCards += `
        <div class="price-card">
          ${badge}
          <div class="store-row">
            <div class="store-name">${o.store}</div>
            <div class="store-status">IN STOCK</div>
          </div>
          <div class="price-label">Current Price</div>
          <div class="price">₹${Number(o.price).toLocaleString()}</div>
          <a class="shop-btn" href="${API}/go/${o.offerId}" target="_blank" rel="noopener">
            Shop on ${o.store}
          </a>
        </div>
      `;
    });

    if(!priceCards){
      priceCards = `
        <div class="price-card" style="grid-column:1/-1;text-align:center;">
          <div style="padding:30px;color:#64748b;font-weight:600;">
            No offers currently available
          </div>
        </div>
      `;
    }

    const summaryPills = `
      ${ p.lowestPrice ? `<div class="summary-pill">Lowest ₹${p.lowestPrice.toLocaleString()}</div>` : "" }
      ${ p.averagePrice ? `<div class="summary-pill">Avg ₹${p.averagePrice.toLocaleString()}</div>` : "" }
      ${ p.highestPrice ? `<div class="summary-pill">Highest ₹${p.highestPrice.toLocaleString()}</div>` : "" }
      ${ offers.length > 1 ? `<div class="summary-pill">${offers.length} stores compared</div>` : "" }
    `;

    document.getElementById("main-content").innerHTML = `

      <div class="hero-card">

        ${ p.rating ? `
          <div class="rating-box">
            <span class="material-symbols-outlined">star</span>
            <strong>${p.rating}</strong>
            ${ p.reviews ? `<span style="color:#64748b;font-weight:500;font-size:12px;">(${p.reviews.toLocaleString()})</span>` : "" }
          </div>` : "" }

        <div class="product-image-box">
          <img src="${p.image || ''}" alt="${(p.title || '').replace(/"/g,'&quot;')}" onerror="this.src='[via.placeholder.com](https://via.placeholder.com/400x400?text=No+Image)'">
        </div>

        <div class="brand">
          ${p.brand || p.mainCategory || "Premium Choice"}
        </div>

        <div class="product-title">
          ${p.title || 'Untitled Product'}
        </div>

        <div class="price-summary">
          ${summaryPills}
        </div>

      </div>

      <div class="price-grid">
        ${priceCards}
      </div>

      <div class="spec-card">

        <div class="section-title">Product Information</div>

        <div class="spec-grid">

          <div class="spec-item">
            <div class="spec-label">Category</div>
            <div class="spec-value">${p.mainCategory || "—"}</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Sub Category</div>
            <div class="spec-value">${p.subCategory || "—"}</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Brand</div>
            <div class="spec-value">${p.brand || "—"}</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Stores Available</div>
            <div class="spec-value">${offers.length}</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Delivery</div>
            <div class="spec-value">Varies by store</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Warranty</div>
            <div class="spec-value">As per brand</div>
          </div>

        </div>

      </div>

      <div class="chart-card">

        <div class="chart-top">

          <div class="section-title" style="margin-bottom:0;">Price Trends</div>

          <div class="chart-tags" id="chartLegend"></div>

        </div>

        <canvas id="priceChart"></canvas>

      </div>

      <div class="related-card">
        <div class="section-title">Related Products</div>
        <div class="related-grid" id="relatedGrid">
          <div style="grid-column:1/-1;text-align:center;color:#64748b;padding:20px;">
            Loading...
          </div>
        </div>
      </div>

    `;

    loadPriceHistory();
    loadRelated();

  }catch(err){
    console.error(err);
    showError(err.message || "Backend not reachable");
  }
}

async function loadPriceHistory(){
  try{
    const data = await apiGet(`/api/price-history/${encodeURIComponent(id)}`);
    const history = data.history || [];

    if(!history.length){
      // Fallback: synthetic chart from current offers
      drawFallbackChart();
      return;
    }

    // Group by store
    const byStore = {};
    history.forEach(h=>{
      const s = h.store || "Price";
      if(!byStore[s]) byStore[s] = [];
      byStore[s].push({x: h.date, y: h.price});
    });

    const colors = ["#2563eb","#64748b","#10b981","#f59e0b","#ef4444"];
    const datasets = Object.keys(byStore).map((store, i)=>({
      label: store,
      data: byStore[store],
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + "22",
      fill: i === 0,
      tension: 0.35,
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 5
    }));

    // Legend
    document.getElementById("chartLegend").innerHTML = Object.keys(byStore).map((s,i)=>`
      <div class="chart-tag">
        <div class="dot" style="background:${colors[i % colors.length]};"></div>
        ${s}
      </div>
    `).join("");

    const labels = [...new Set(history.map(h=>h.date))].sort();

    new Chart(document.getElementById("priceChart"),{
      type:"line",
      data:{ labels, datasets },
      options:{
        responsive:true,
        plugins:{ legend:{ display:false } },
        scales:{
          x:{ grid:{ display:false }, ticks:{ color:"#64748b" } },
          y:{ grid:{ color:"rgba(0,0,0,0.05)" }, ticks:{ color:"#64748b", callback:(v)=>"₹"+v } }
        }
      }
    });

  }catch(e){
    drawFallbackChart();
  }
}

function drawFallbackChart(){
  if(!currentProduct) return;
  const offers = currentProduct.offers || [];
  if(!offers.length) return;

  const colors = ["#2563eb","#64748b","#10b981","#f59e0b"];
  const labels = ["Jan","Feb","Mar","Apr","May","Jun"];

  const datasets = offers.slice(0,4).map((o, i)=>{
    const base = o.price;
    const data = [
      base + Math.round(base*0.08),
      base + Math.round(base*0.04),
      base + Math.round(base*0.12),
      base - Math.round(base*0.02),
      base + Math.round(base*0.06),
      base
    ];
    return {
      label: o.store,
      data,
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + "22",
      fill: i === 0,
      tension: 0.4,
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 5,
      borderDash: i === 0 ? [] : [6,6]
    };
  });

  document.getElementById("chartLegend").innerHTML = offers.slice(0,4).map((o,i)=>`
    <div class="chart-tag">
      <div class="dot" style="background:${colors[i % colors.length]};"></div>
      ${o.store}
    </div>
  `).join("");

  new Chart(document.getElementById("priceChart"),{
    type:"line",
    data:{ labels, datasets },
    options:{
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ display:false }, ticks:{ color:"#64748b" } },
        y:{ grid:{ color:"rgba(0,0,0,0.05)" }, ticks:{ color:"#64748b", callback:(v)=>"₹"+v } }
      }
    }
  });
}

async function loadRelated(){
  const grid = document.getElementById("relatedGrid");
  try{
    const list = await apiGet(`/api/related/${encodeURIComponent(id)}?limit=8`);
    if(!list.length){
      grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:20px;">No related products</div>`;
      return;
    }

    grid.innerHTML = "";
    list.forEach(rp=>{
      const div = document.createElement("div");
      div.className = "related-item";
      div.innerHTML = `
        <img src="${rp.image || ''}" alt="" onerror="this.src='[via.placeholder.com](https://via.placeholder.com/200x200?text=No+Image)'"/>
        <div class="related-title">${rp.title || ''}</div>
        <div class="related-price">₹${(rp.lowestPrice || 0).toLocaleString()}</div>
      `;
      div.addEventListener("click", ()=>{
        localStorage.setItem("productId", rp.id);
        location.reload();
      });
      grid.appendChild(div);
    });

  }catch(e){
    grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;color:#64748b;padding:20px;">Couldn't load related products</div>`;
  }
}

loadProduct();

</script>

</body>
</html>
