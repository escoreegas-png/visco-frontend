<html lang="en">
<head>

<style>
*{ font-family:'Poppins',sans-serif; margin:0; padding:0; box-sizing:border-box; }

:root{
  --primary:#2563eb;
  --primary-dark:#1d4ed8;
  --primary-soft:#dbeafe;
  --bg:#f8fbff;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --success:#22c55e;
}

body{ background:var(--bg); overflow-x:hidden; color:var(--text); padding-bottom:90px; }

.glass{ backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); }

.hero-bg{
  background:
    radial-gradient(circle at top right, rgba(37,99,235,0.15), transparent 25%),
    radial-gradient(circle at bottom left, rgba(59,130,246,0.12), transparent 25%);
}

.glow{
  position:absolute;
  width:450px; height:450px;
  border-radius:999px;
  background:rgba(37,99,235,0.12);
  filter:blur(100px);
  z-index:0;
  pointer-events:none;
}

.skeleton{
  background:linear-gradient(90deg,#eef2f7 25%,#e2e8f0 50%,#eef2f7 75%);
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
  border-radius:16px;
}
@keyframes shimmer{
  0%{ background-position:200% 0; }
  100%{ background-position:-200% 0; }
}

.hide-scrollbar::-webkit-scrollbar{ display:none; }
.hide-scrollbar{ scrollbar-width:none; }

.info-card{
  transition:.3s ease;
  background:white;
  border:1px solid var(--border);
}
.info-card:hover{
  transform:translateY(-6px);
  box-shadow:0 20px 40px rgba(37,99,235,0.12),0 12px 25px rgba(0,0,0,0.06);
}

.line-clamp-2{
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.footer-link:hover{ color:white; transform:translateX(4px); }

/* UNIFORM Related Product Card */
.rp-card{
  background:white;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  transition:.25s ease;
  cursor:pointer;
  display:flex;
  flex-direction:column;
  height:100%;
  min-height:300px;
}
.rp-card:hover{
  transform:translateY(-4px);
  border-color:#bfdbfe;
  box-shadow:0 12px 30px rgba(37,99,235,0.12);
}
.rp-image-wrap{
  position:relative;
  background:#f8fafc;
  padding:14px;
  aspect-ratio:1/1;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
}
.rp-image-wrap img{
  max-width:100%; max-height:100%;
  width:auto; height:auto;
  object-fit:contain;
  transition:transform .3s;
}
.rp-card:hover .rp-image-wrap img{ transform:scale(1.05); }
.rp-discount{
  position:absolute;
  top:8px; left:8px;
  background:#ef4444;
  color:white;
  font-size:10px;
  font-weight:700;
  padding:3px 7px;
  border-radius:5px;
  z-index:2;
}
.rp-body{
  padding:10px 12px 12px;
  display:flex;
  flex-direction:column;
  flex:1;
  justify-content:space-between;
}
.rp-title{
  font-size:12px;
  font-weight:500;
  color:#334155;
  line-height:1.4;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
  height:34px;
  margin-bottom:6px;
}
.rp-price-row{
  display:flex;
  align-items:baseline;
  gap:6px;
  margin-bottom:4px;
  min-height:22px;
}
.rp-price{ font-size:15px; font-weight:800; color:#0f172a; }
.rp-mrp{ font-size:11px; color:#94a3b8; text-decoration:line-through; }
.rp-stores{
  font-size:10px;
  color:#475569;
  background:#f1f5f9;
  padding:5px 8px;
  border-radius:8px;
  font-weight:600;
  margin-top:8px;
  display:flex;
  align-items:center;
  gap:5px;
  height:24px;
}
.rp-store-dot{ width:5px; height:5px; border-radius:50%; background:#2563eb; flex-shrink:0; }

@media(max-width:768px){
  .hero-title{ font-size:30px !important; line-height:38px !important; }
  .price-grid{ grid-template-columns:1fr !important; }
  .spec-grid{ grid-template-columns:1fr !important; }
  .rp-card{ min-height:260px; }
}
</style>
</head>

<body>

<header class="fixed top-0 left-0 w-full h-16 z-50 bg-white/80 glass border-b border-slate-200 flex items-center justify-between px-4 md:px-10">

    <div class="w-11 h-11 rounded-2xl bg-white flex items-center justify-center shadow-lg shadow-blue-200 overflow-hidden">
      <img src="logo.png" alt="Visco Logo" class="w-full h-full object-contain" onerror="this.style.display='none';this.parentElement.innerHTML='<i class=\'fa-solid fa-bag-shopping text-blue-700 text-xl\'></i>'"/>

    <button onclick="location.href='account.html'" class="w-11 h-11 rounded-xl bg-white border border-slate-200 hover:border-blue-500 transition flex items-center justify-center">

<div class="relative hero-bg pt-20">

<main class="relative z-10 max-w-7xl mx-auto px-4 md:px-10 -mt-6">

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

<footer class="mt-24 bg-slate-950 text-white">

      <div class="flex items-center gap-3 mb-5">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-br from-blue-600 to-blue-700 flex items-center justify-center">

        </div>

    <div>

<script>
const API = "https://visco1.onrender.com";
const id  = localStorage.getItem("productId");
let currentProduct = null;

document.getElementById("footerYear").innerText = new Date().getFullYear();

function goBack(){
  if(window.history.length > 1) window.history.back();
  else window.location.href = "homepage.html";
}

async function shareProduct(){
  if(!currentProduct) return;
  const text = `${currentProduct.title} — Best price ₹${currentProduct.lowestPrice} on Visco Compare`;
  if(navigator.share){
    try{ await navigator.share({title: currentProduct.title, text, url: location.href}); }catch(e){}
  }else{
    navigator.clipboard.writeText(`${text}\n${location.href}`);
    alert("Link copied!");
  }
}

async function apiGet(path){
  const res = await fetch(API + path);
  const json = await res.json().catch(()=>({}));
  if(!res.ok || !json.success) throw new Error(json.error || "Request failed");
  return json.data;
}

function showError(msg){
  document.getElementById("loading").classList.add("hidden");
  const main = document.getElementById("main-content");
  main.classList.remove("hidden");
  main.innerHTML = `
    <div class="text-center py-20">
      <i class="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-4"></i>
      <div class="font-semibold text-lg text-slate-700">${msg}</div>
      <button onclick="loadProduct()" class="mt-5 bg-gradient-to-r from-blue-700 to-blue-500 text-white px-8 py-3 rounded-full font-semibold shadow-lg shadow-blue-100 hover:scale-105 transition">
        Retry
      </button>
    </div>`;
}

async function loadProduct(){
  if(!id){ showError("No product selected"); return; }

  try{
    const p = await apiGet(`/api/product/${encodeURIComponent(id)}`);
    currentProduct = p;

    document.getElementById("loading").classList.add("hidden");
    document.getElementById("main-content").classList.remove("hidden");

    const offers = p.offers || [];
    let priceCards = "";
    offers.forEach((o, idx)=>{
      const badge = idx === 0 ? `
        <div class="absolute top-0 right-0">
          <span class="bg-gradient-to-r from-blue-700 to-blue-500 text-white text-[11px] font-bold px-4 py-2 rounded-bl-2xl rounded-tr-3xl shadow-lg">
            🏆 BEST VALUE
          </span>
        </div>` : "";

      priceCards += `
        <div class="info-card rounded-3xl p-6 relative overflow-hidden">
          ${badge}
          <div class="flex justify-between items-center mb-5 mt-2">
            <div class="text-[18px] font-bold">${o.store}</div>
            <div class="inline-flex items-center gap-1.5 bg-green-100 text-green-700 text-[11px] font-bold px-3 py-1 rounded-full">
              <span class="w-1.5 h-1.5 bg-green-500 rounded-full"></span>
              IN STOCK
            </div>
          </div>
          <div class="text-slate-500 text-sm mb-2">Current Price</div>
          <div class="text-blue-700 font-extrabold text-[36px] leading-tight">₹${Number(o.price).toLocaleString()}</div>
          <a class="mt-5 block text-center bg-gradient-to-r from-blue-700 to-blue-500 text-white rounded-xl py-3 font-semibold hover:opacity-90 transition"
             href="${API}/go/${o.offerId}" target="_blank" rel="noopener">
            Shop on ${o.store}
          </a>
        </div>`;
    });

    if(!priceCards){
      priceCards = `<div class="info-card rounded-3xl p-10 text-center text-slate-500 font-semibold" style="grid-column:1/-1;">No offers currently available</div>`;
    }

    const summaryPills = `
      ${ p.lowestPrice ? `<div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-full font-semibold text-sm border border-blue-100">Lowest ₹${p.lowestPrice.toLocaleString()}</div>` : "" }
      ${ p.averagePrice ? `<div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-full font-semibold text-sm border border-blue-100">Avg ₹${p.averagePrice.toLocaleString()}</div>` : "" }
      ${ p.highestPrice ? `<div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-full font-semibold text-sm border border-blue-100">Highest ₹${p.highestPrice.toLocaleString()}</div>` : "" }
      ${ offers.length > 1 ? `<div class="bg-blue-50 text-blue-700 px-4 py-2 rounded-full font-semibold text-sm border border-blue-100">${offers.length} stores compared</div>` : "" }
    `;

    document.getElementById("main-content").innerHTML = `
      <div class="info-card rounded-3xl p-6 md:p-8 relative overflow-hidden mb-6">
        ${ p.rating ? `
          <div class="absolute top-5 right-5 z-10 bg-white border border-slate-200 px-4 py-2 rounded-full flex items-center gap-2 shadow-sm">
            <i class="fa-solid fa-star text-amber-400"></i>
            <span class="font-bold text-slate-800">${p.rating}</span>
            ${ p.reviews ? `<span class="text-slate-400 text-xs">(${p.reviews.toLocaleString()})</span>` : "" }
          </div>` : "" }

        <div class="grid md:grid-cols-2 gap-8 items-center">
          <div class="bg-slate-100 rounded-3xl flex items-center justify-center p-6 aspect-square">
            <img src="${p.image || ''}" alt="${(p.title || '').replace(/"/g,'&quot;')}"
                 class="max-w-full max-h-full w-auto h-auto object-contain"
                 onerror="this.src='[via.placeholder.com](https://via.placeholder.com/400x400?text=No+Image)'"/>
          </div>

          <div>
            <div class="text-xs uppercase tracking-[2px] text-blue-700 font-bold mb-3">
              ${p.brand || p.mainCategory || "Premium Choice"}
            </div>
            <h1 class="hero-title text-[36px] leading-[44px] font-extrabold tracking-[-1px] text-slate-900">
              ${p.title || 'Untitled Product'}
            </h1>
            <div class="flex flex-wrap gap-2 mt-5">${summaryPills}</div>
          </div>
        </div>
      </div>

      <div class="mb-6">
        <div class="flex items-end justify-between mb-5">
          <div>
            <h2 class="text-[24px] font-bold">Compare Prices</h2>
            <p class="text-slate-500 text-sm mt-1">Best deals across top stores</p>
          </div>
        </div>
        <div class="price-grid grid grid-cols-1 md:grid-cols-2 gap-5">${priceCards}</div>
      </div>

      <div class="info-card rounded-3xl p-6 md:p-8 mb-6">
        <h2 class="text-[24px] font-bold mb-6">Product Information</h2>
        <div class="spec-grid grid grid-cols-2 md:grid-cols-3 gap-4">
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wide mb-2">Category</div>
            <div class="font-semibold text-sm">${p.mainCategory || "—"}</div>
          </div>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wide mb-2">Sub Category</div>
            <div class="font-semibold text-sm">${p.subCategory || "—"}</div>
          </div>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wide mb-2">Brand</div>
            <div class="font-semibold text-sm">${p.brand || "—"}</div>
          </div>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wide mb-2">Stores</div>
            <div class="font-semibold text-sm">${offers.length}</div>
          </div>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wide mb-2">Delivery</div>
            <div class="font-semibold text-sm">Varies by store</div>
          </div>
          <div class="bg-slate-50 border border-slate-100 rounded-2xl p-4">
            <div class="text-[10px] text-slate-400 uppercase font-bold tracking-wide mb-2">Warranty</div>
            <div class="font-semibold text-sm">As per brand</div>
          </div>
        </div>
      </div>

      <div class="info-card rounded-3xl p-6 md:p-8 mb-6">
        <div class="flex items-center justify-between flex-wrap gap-3 mb-6">
          <h2 class="text-[24px] font-bold">Price Trends</h2>
          <div id="chartLegend" class="flex gap-4 flex-wrap"></div>
        </div>
        <canvas id="priceChart" style="max-height:300px;"></canvas>
      </div>

      <div class="info-card rounded-3xl p-6 md:p-8 mb-6">
        <h2 class="text-[24px] font-bold mb-6">Related Products</h2>
        <div id="relatedGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
          <div class="col-span-full text-center text-slate-400 py-8">Loading...</div>
        </div>
      </div>
    `;

    loadPriceHistory();
    loadRelated();

  }catch(err){
    console.error(err);
    showError(err.message || "Backend not reachable");
  }
}

async function loadPriceHistory(){
  try{
    const data = await apiGet(`/api/price-history/${encodeURIComponent(id)}`);
    const history = data.history || [];
    if(!history.length){ drawFallbackChart(); return; }

    const byStore = {};
    history.forEach(h=>{
      const s = h.store || "Price";
      if(!byStore[s]) byStore[s] = [];
      byStore[s].push({x: h.date, y: h.price});
    });

    const colors = ["#2563eb","#64748b","#10b981","#f59e0b","#ef4444"];
    const datasets = Object.keys(byStore).map((store, i)=>({
      label: store,
      data: byStore[store],
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + "22",
      fill: i === 0,
      tension: 0.35,
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 5
    }));

    document.getElementById("chartLegend").innerHTML = Object.keys(byStore).map((s,i)=>`
      <div class="flex items-center gap-2 text-sm font-semibold">
        <div class="w-3 h-3 rounded-full" style="background:${colors[i % colors.length]};"></div>
        ${s}
      </div>`).join("");

    const labels = [...new Set(history.map(h=>h.date))].sort();

    new Chart(document.getElementById("priceChart"),{
      type:"line",
      data:{ labels, datasets },
      options:{
        responsive:true,
        plugins:{ legend:{ display:false } },
        scales:{
          x:{ grid:{ display:false }, ticks:{ color:"#64748b" } },
          y:{ grid:{ color:"rgba(0,0,0,0.05)" }, ticks:{ color:"#64748b", callback:(v)=>"₹"+v } }
        }
      }
    });
  }catch(e){ drawFallbackChart(); }
}

function drawFallbackChart(){
  if(!currentProduct) return;
  const offers = currentProduct.offers || [];
  if(!offers.length) return;

  const colors = ["#2563eb","#64748b","#10b981","#f59e0b"];
  const labels = ["Jan","Feb","Mar","Apr","May","Jun"];

  const datasets = offers.slice(0,4).map((o, i)=>{
    const base = o.price;
    const data = [
      base + Math.round(base*0.08),
      base + Math.round(base*0.04),
      base + Math.round(base*0.12),
      base - Math.round(base*0.02),
      base + Math.round(base*0.06),
      base
    ];
    return {
      label: o.store,
      data,
      borderColor: colors[i % colors.length],
      backgroundColor: colors[i % colors.length] + "22",
      fill: i === 0,
      tension: 0.4,
      borderWidth: 2.5,
      pointRadius: 0,
      pointHoverRadius: 5,
      borderDash: i === 0 ? [] : [6,6]
    };
  });

  document.getElementById("chartLegend").innerHTML = offers.slice(0,4).map((o,i)=>`
    <div class="flex items-center gap-2 text-sm font-semibold">
      <div class="w-3 h-3 rounded-full" style="background:${colors[i % colors.length]};"></div>
      ${o.store}
    </div>`).join("");

  new Chart(document.getElementById("priceChart"),{
    type:"line",
    data:{ labels, datasets },
    options:{
      responsive:true,
      plugins:{ legend:{ display:false } },
      scales:{
        x:{ grid:{ display:false }, ticks:{ color:"#64748b" } },
        y:{ grid:{ color:"rgba(0,0,0,0.05)" }, ticks:{ color:"#64748b", callback:(v)=>"₹"+v } }
      }
    }
  });
}

async function loadRelated(){
  const grid = document.getElementById("relatedGrid");
  try{
    const list = await apiGet(`/api/related/${encodeURIComponent(id)}?limit=8`);
    if(!list.length){
      grid.innerHTML = `<div class="col-span-full text-center text-slate-400 py-8">No related products</div>`;
      return;
    }

    grid.innerHTML = "";
    list.forEach(rp=>{
      const offers = Array.isArray(rp.offers) ? rp.offers : [];
      const lowest = Number(rp.lowestPrice) || 0;
      const highest = Number(rp.highestPrice) || lowest;
      const discount = highest > lowest ? Math.round(((highest - lowest) / highest) * 100) : 0;
      const storesText = offers.length > 1 ? `${offers.length} stores` : (offers.length === 1 ? "1 store" : "Compare");

      const div = document.createElement("div");
      div.className = "rp-card";
      div.innerHTML = `
        <div class="rp-image-wrap">
          ${discount >= 10 ? `<span class="rp-discount">${discount}% OFF</span>` : ""}
          <img src="${rp.image || ''}" alt="${(rp.title || '').replace(/"/g,'&quot;')}" onerror="this.src='[via.placeholder.com](https://via.placeholder.com/200x200?text=No+Image)'"/>
        </div>
        <div class="rp-body">
          <div>
            <div class="rp-title">${rp.title || ''}</div>
            <div class="rp-price-row">
              <span class="rp-price">₹${lowest.toLocaleString()}</span>
              ${highest > lowest ? `<span class="rp-mrp">₹${highest.toLocaleString()}</span>` : ""}
            </div>
          </div>
          <div class="rp-stores">
            <span class="rp-store-dot"></span>
            <span>${storesText}</span>
          </div>
        </div>
      `;
      div.addEventListener("click", ()=>{
        localStorage.setItem("productId", rp.id);
        location.reload();
      });
      grid.appendChild(div);
    });

  }catch(e){
    grid.innerHTML = `<div class="col-span-full text-center text-slate-400 py-8">Couldn't load related products</div>`;
  }
}

loadProduct();
</script>
