<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Visco Product Details</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
  --primary:#2563eb;
  --primary-dark:#004ac6;
  --secondary:#64748b;
  --bg:#f7f9fb;
  --card:#ffffff;
  --border:#e2e8f0;
  --text:#0f172a;
  --muted:#64748b;
  --success:#22c55e;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  padding-bottom:100px;
}

.material-symbols-outlined{
  font-variation-settings:
  'FILL' 0,
  'wght' 400,
  'GRAD' 0,
  'opsz' 24;
}

/* HEADER */

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:70px;
  background:rgba(255,255,255,0.85);
  backdrop-filter:blur(12px);
  border-bottom:1px solid rgba(0,0,0,0.06);
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 20px;
  z-index:1000;
}

.header-left{
  display:flex;
  align-items:center;
  gap:14px;
}

.back-btn{
  width:42px;
  height:42px;
  border-radius:50%;
  border:none;
  background:#eef4ff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:0.2s ease;
}

.back-btn:hover{
  transform:scale(1.05);
}

.back-btn span{
  color:var(--primary-dark);
}

.header-title{
  font-size:20px;
  font-weight:700;
}

.header-icons{
  display:flex;
  align-items:center;
  gap:10px;
}

.header-icons span{
  color:var(--secondary);
}

/* CONTAINER */

.container{
  max-width:1100px;
  margin:auto;
  padding:95px 18px 20px;
}

/* LOADING */

.loading{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.shimmer{
  border-radius:24px;
  background:linear-gradient(
  90deg,
  #f1f5f9 25%,
  #e2e8f0 50%,
  #f1f5f9 75%
  );
  background-size:200% 100%;
  animation:shimmer 1.5s infinite;
}

@keyframes shimmer{
  0%{
    background-position:200% 0;
  }
  100%{
    background-position:-200% 0;
  }
}

/* HERO CARD */

.hero-card{
  background:var(--card);
  border-radius:30px;
  padding:24px;
  border:1px solid var(--border);
  box-shadow:0 10px 30px rgba(0,0,0,0.04);
  position:relative;
  overflow:hidden;
}

.rating-box{
  position:absolute;
  top:18px;
  right:18px;
  background:rgba(255,255,255,0.8);
  backdrop-filter:blur(10px);
  padding:8px 14px;
  border-radius:999px;
  display:flex;
  align-items:center;
  gap:6px;
  border:1px solid #e2e8f0;
}

.rating-box span{
  color:#f59e0b;
}

.product-image-box{
  width:100%;
  aspect-ratio:1/1;
  margin-bottom:24px;
  overflow:hidden;
}

.product-image-box img{
  width:100%;
  height:100%;
  object-fit:contain;
  transition:0.4s ease;
}

.product-image-box img:hover{
  transform:scale(1.05);
}

.brand{
  font-size:12px;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--primary);
  font-weight:700;
  margin-bottom:10px;
}

.product-title{
  font-size:32px;
  line-height:1.3;
  font-weight:800;
}

/* PRICE GRID */

.price-grid{
  margin-top:20px;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:18px;
}

.price-card{
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
  position:relative;
  transition:0.3s ease;
}

.price-card:hover{
  transform:translateY(-4px);
}

.best-badge{
  position:absolute;
  top:0;
  right:0;
  background:var(--primary);
  color:white;
  padding:8px 16px;
  border-bottom-left-radius:18px;
  font-size:12px;
  font-weight:700;
}

.store-row{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:22px;
}

.store-name{
  font-size:18px;
  font-weight:700;
}

.store-status{
  font-size:13px;
  color:var(--success);
  font-weight:700;
}

.price-label{
  color:var(--muted);
  font-size:14px;
  margin-bottom:8px;
}

.price{
  font-size:42px;
  color:var(--primary-dark);
  font-weight:800;
}

.shop-btn{
  margin-top:22px;
  width:100%;
  border:none;
  background:var(--primary);
  color:white;
  padding:15px;
  border-radius:18px;
  font-size:15px;
  font-weight:700;
  cursor:pointer;
  transition:0.3s ease;
}

.shop-btn:hover{
  background:var(--primary-dark);
}

/* SPECS */

.spec-card{
  margin-top:20px;
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
}

.section-title{
  font-size:24px;
  font-weight:700;
  margin-bottom:20px;
}

.spec-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:14px;
}

.spec-item{
  background:#f8fafc;
  border:1px solid #edf2f7;
  border-radius:18px;
  padding:16px;
}

.spec-label{
  font-size:11px;
  color:var(--muted);
  text-transform:uppercase;
  margin-bottom:6px;
  font-weight:700;
}

.spec-value{
  font-size:15px;
  font-weight:600;
}

/* CHART */

.chart-card{
  margin-top:20px;
  background:white;
  border-radius:28px;
  padding:24px;
  border:1px solid var(--border);
}

.chart-top{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:25px;
}

.chart-tags{
  display:flex;
  gap:15px;
}

.chart-tag{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:13px;
  font-weight:600;
}

.dot{
  width:10px;
  height:10px;
  border-radius:50%;
}

.dot.blue{
  background:#2563eb;
}

.dot.gray{
  background:#64748b;
}

canvas{
  max-height:300px;
}

/* BOTTOM NAV */

.bottom-nav{
  position:fixed;
  bottom:0;
  width:100%;
  height:78px;
  background:rgba(255,255,255,0.88);
  backdrop-filter:blur(12px);
  border-top:1px solid rgba(0,0,0,0.06);
  display:flex;
  justify-content:space-around;
  align-items:center;
}

.nav-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  font-size:12px;
  color:#64748b;
  text-decoration:none;
  font-weight:600;
}

.nav-item.active{
  color:var(--primary);
}

.nav-item span{
  font-size:24px;
}

/* MOBILE */

@media(max-width:768px){

  .price-grid{
    grid-template-columns:1fr;
  }

  .spec-grid{
    grid-template-columns:1fr;
  }

  .product-title{
    font-size:26px;
  }

}

</style>
</head>

<body>

<header>

  <div class="header-left">

    <button class="back-btn" onclick="goBack()">
      <span class="material-symbols-outlined">arrow_back</span>
    </button>

    <div class="header-title">Product Details</div>

  </div>

  <div class="header-icons">
    <span class="material-symbols-outlined">location_on</span>
    <span class="material-symbols-outlined">person</span>
  </div>

</header>

<div class="container">

  <!-- LOADING -->
  <div class="loading" id="loading">

    <div class="shimmer" style="height:340px;"></div>
    <div class="shimmer" style="height:50px;width:70%;"></div>
    <div class="shimmer" style="height:120px;"></div>

  </div>

  <!-- MAIN CONTENT -->
  <div id="main-content" style="display:none;"></div>

</div>

<!-- BOTTOM NAV -->

<div class="bottom-nav">

  <a href="#" class="nav-item">
    <span class="material-symbols-outlined">search</span>
    Explore
  </a>

  <a href="#" class="nav-item">
    <span class="material-symbols-outlined">local_offer</span>
    Deals
  </a>

  <a href="#" class="nav-item active">
    <span class="material-symbols-outlined">compare_arrows</span>
    Compare
  </a>

  <a href="#" class="nav-item">
    <span class="material-symbols-outlined">history</span>
    History
  </a>

  <a href="#" class="nav-item">
    <span class="material-symbols-outlined">person</span>
    Profile
  </a>

</div>

<script>

const id = localStorage.getItem("productId");

function goBack(){
  if(window.history.length > 1){
    window.history.back();
  }else{
    window.location.href = "homepage.html";
  }
}

async function loadProduct(){

  try{

    const res = await fetch(`https://visco.onrender.com/product/${id}`);
    const p = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("main-content").style.display = "block";

    if(!p || p.error){
      document.getElementById("main-content").innerHTML = `
        <div style="text-align:center;padding:60px;color:red;font-weight:700;">
          Product Not Found
        </div>
      `;
      return;
    }

    const links = {
      amazon: p.amazon_link,
      flipkart: p.flipkart_link
    };

    const stores = {
      amazon: "Amazon",
      flipkart: "Flipkart"
    };

    let bestKey = "";
    let minPrice = Infinity;

    for(let k in stores){

      if(p[k] && p[k] < minPrice){
        minPrice = p[k];
        bestKey = k;
      }

    }

    let priceCards = "";

    let keys = [];
    let values = [];

    for(let k in stores){

      if(p[k]){

        const bestBadge = k === bestKey
        ? `<div class="best-badge">BEST VALUE</div>`
        : "";

        priceCards += `

          <div class="price-card">

            ${bestBadge}

            <div class="store-row">
              <div class="store-name">${stores[k]}</div>
              <div class="store-status">IN STOCK</div>
            </div>

            <div class="price-label">Current Price</div>

            <div class="price">
              ₹${Number(p[k]).toLocaleString()}
            </div>

            <button class="shop-btn"
            onclick="window.open('${links[k]}')">
              Shop on ${stores[k]}
            </button>

          </div>

        `;

        keys.push(stores[k]);
        values.push(p[k]);

      }

    }

    document.getElementById("main-content").innerHTML = `

      <!-- HERO -->

      <div class="hero-card">

        <div class="rating-box">
          <span class="material-symbols-outlined">star</span>
          <strong>${p.rating || 4.5}</strong>
        </div>

        <div class="product-image-box">
          <img src="${p.image}" alt="${p.name}">
        </div>

        <div class="brand">
          ${p.category || "Premium Choice"}
        </div>

        <div class="product-title">
          ${p.name}
        </div>

      </div>

      <!-- PRICE GRID -->

      <div class="price-grid">

        ${priceCards}

      </div>

      <!-- SPECS -->

      <div class="spec-card">

        <div class="section-title">
          Product Specifications
        </div>

        <div class="spec-grid">

          <div class="spec-item">
            <div class="spec-label">Delivery</div>
            <div class="spec-value">Express 2-3 Days</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Warranty</div>
            <div class="spec-value">1 Year Warranty</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Replacement</div>
            <div class="spec-value">7 Days Replacement</div>
          </div>

          <div class="spec-item">
            <div class="spec-label">Exchange</div>
            <div class="spec-value">Available</div>
          </div>

        </div>

      </div>

      <!-- CHART -->

      <div class="chart-card">

        <div class="chart-top">

          <div class="section-title">
            Price Trends
          </div>

          <div class="chart-tags">

            <div class="chart-tag">
              <div class="dot blue"></div>
              Amazon
            </div>

            <div class="chart-tag">
              <div class="dot gray"></div>
              Flipkart
            </div>

          </div>

        </div>

        <canvas id="priceChart"></canvas>

      </div>

    `;

    initChart(p.amazon, p.flipkart);

  }catch(err){

    console.log(err);

    document.getElementById("loading").style.display = "none";

    document.getElementById("main-content").style.display = "block";

    document.getElementById("main-content").innerHTML = `
      <div style="text-align:center;padding:60px;color:red;font-weight:700;">
        Backend Not Running
      </div>
    `;

  }

}

function initChart(amazonPrice, flipkartPrice){

  const ctx = document.getElementById("priceChart");

  const amazonTrend = [
    amazonPrice + 200,
    amazonPrice + 100,
    amazonPrice + 300,
    amazonPrice - 50,
    amazonPrice + 150,
    amazonPrice
  ];

  const flipkartTrend = [
    flipkartPrice + 150,
    flipkartPrice + 250,
    flipkartPrice + 100,
    flipkartPrice + 180,
    flipkartPrice + 50,
    flipkartPrice
  ];

  const gradient = ctx
  .getContext("2d")
  .createLinearGradient(0,0,0,400);

  gradient.addColorStop(0,"rgba(37,99,235,0.25)");
  gradient.addColorStop(1,"rgba(37,99,235,0)");

  new Chart(ctx,{

    type:"line",

    data:{
      labels:["Jan","Feb","Mar","Apr","May","Jun"],

      datasets:[

        {
          label:"Amazon",
          data:amazonTrend,
          borderColor:"#2563eb",
          backgroundColor:gradient,
          fill:true,
          tension:0.4,
          borderWidth:3,
          pointRadius:0,
          pointHoverRadius:5
        },

        {
          label:"Flipkart",
          data:flipkartTrend,
          borderColor:"#64748b",
          borderDash:[6,6],
          tension:0.4,
          borderWidth:2,
          fill:false,
          pointRadius:0
        }

      ]
    },

    options:{

      responsive:true,

      plugins:{
        legend:{
          display:false
        }
      },

      scales:{

        x:{
          grid:{
            display:false
          },
          ticks:{
            color:"#64748b"
          }
        },

        y:{
          grid:{
            color:"rgba(0,0,0,0.05)"
          },
          ticks:{
            color:"#64748b"
          }
        }

      }

    }

  });

}

loadProduct();

</script>

</body>
</html>
