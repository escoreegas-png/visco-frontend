<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Price Drops - Visco</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>

<style>
body{
  font-family:'Poppins',sans-serif;
  background: linear-gradient(135deg,#f8fbff,#ffffff);
  overflow:hidden;
}

.glow{
  position:absolute;
  width:450px;
  height:450px;
  background:rgba(37,99,235,0.15);
  filter:blur(120px);
  border-radius:999px;
}
</style>

</head>

<body class="flex items-center justify-center min-h-screen relative">

<!-- glow -->
<div class="glow top-[-120px] left-[-120px]"></div>
<div class="glow bottom-[-120px] right-[-120px]"></div>

<div class="text-center px-6">

  <!-- ICON -->
  <div class="w-20 h-20 mx-auto bg-blue-100 rounded-2xl flex items-center justify-center shadow-lg mb-6">
    <i class="fa-solid fa-tag text-blue-700 text-3xl"></i>
  </div>

  <!-- TITLE -->
  <h1 class="text-3xl md:text-4xl font-bold text-slate-900">
    Price Drops
  </h1>

  <!-- TEXT -->
  <p class="mt-4 text-slate-500 text-lg">
    Smart alerts for price drops across all stores
  </p>

  <p class="mt-2 text-slate-400 text-sm">
    We are building an AI system that will notify you when prices fall instantly.
  </p>

  <!-- BADGE -->
  <div class="mt-6 inline-block bg-blue-600 text-white px-5 py-2 rounded-full font-semibold shadow-lg">
    📉 Coming Soon
  </div>

  <!-- EXTRA -->
  <div class="mt-6 text-slate-400 text-sm">
    Stay tuned — this feature will help you save more money 💰
  </div>

  <!-- BUTTON -->
  <div class="mt-8">
    <a href="homepage.html"
       class="bg-blue-700 hover:bg-blue-800 text-white px-6 py-3 rounded-xl font-semibold transition">
      Back to Home
    </a>
  </div>

</div>

</body>
</html>
