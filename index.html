<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | Visco Compare</title>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Material+Symbols+Outlined" rel="stylesheet"/>

<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: "#004ac6",
        background: "#f7f9fb",
        "on-surface-variant": "#434655",
        "primary-container": "#2563eb",
      }
    }
  }
}
</script>

<style>
body{
  font-family:'Plus Jakarta Sans',sans-serif;
  background:#f7f9fb;
}

.glass{
  background: rgba(255,255,255,0.7);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border:1px solid rgba(0,0,0,0.05);
}

.blob{
  position:absolute;
  width:300px;
  height:300px;
  background:#2563eb;
  filter:blur(90px);
  opacity:0.12;
  border-radius:50%;
}
</style>
</head>

<body class="text-slate-800 overflow-x-hidden">

<!-- BACKGROUND -->
<div class="fixed inset-0 pointer-events-none">
  <div class="blob top-[-120px] left-[-120px]"></div>
  <div class="blob bottom-[-120px] right-[-120px]"></div>
</div>

<!-- HEADER -->
<header class="fixed top-0 w-full z-50 bg-white/80 backdrop-blur-md h-16 flex items-center px-4 justify-between border-b">

  <div class="flex items-center gap-3">

    <!-- BACK BUTTON -->
    <button onclick="history.back()"
      class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-black/5 active:scale-95 transition">
      <span class="material-symbols-outlined text-primary">arrow_back</span>
    </button>

    <!-- LOGO -->
    <div class="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-blue-700 flex items-center justify-center overflow-hidden">
  <img src="/assets/favicon-v2.png" alt="Visco Logo" class="w-full h-full object-contain"/>
</div>

    <div class="leading-tight">
      <div class="font-bold text-primary">Visco Compare</div>
      <div class="text-[10px] text-slate-500 uppercase tracking-widest">
        Smart Price Engine
      </div>
    </div>

  </div>

  <span class="material-symbols-outlined text-primary text-3xl">
    account_circle
  </span>

</header>

<!-- MAIN -->
<main class="min-h-screen flex items-center justify-center px-4 pt-24 pb-10">

<!-- LOGIN CARD -->
<div class="glass w-full max-w-md rounded-2xl p-8 shadow-xl">

  <div class="text-center mb-6">
    <h1 class="text-2xl font-bold text-primary">Login</h1>
    <p class="text-sm text-slate-500">Welcome back to Visco Compare</p>
  </div>

  <form id="loginForm" class="space-y-4">

    <input id="name" placeholder="Your Name"
      class="w-full p-3 rounded-xl bg-white/60 border outline-none focus:ring-2 focus:ring-primary"/>

    <input id="phone" placeholder="+91XXXXXXXXXX" required
      class="w-full p-3 rounded-xl bg-white/60 border outline-none focus:ring-2 focus:ring-primary"/>

    <input id="password" type="password" placeholder="Password" required
      class="w-full p-3 rounded-xl bg-white/60 border outline-none focus:ring-2 focus:ring-primary"/>

    <button id="loginBtn" class="w-full py-3 rounded-full bg-primary text-white font-semibold active:scale-95 transition">
      Login
    </button>

  </form>

  <button onclick="signup()"
    class="w-full mt-3 py-3 rounded-full border border-primary text-primary font-semibold hover:bg-primary/5">
    Create Account
  </button>

  <button onclick="guestMode()"
    class="w-full mt-3 py-3 rounded-full bg-black/5 text-slate-700">
    Continue as Guest
  </button>

</div>

</main>

<!-- TOAST -->
<div id="toast"
  class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-black text-white px-4 py-2 rounded-full text-sm opacity-0 transition">
</div>

<script>

const API = "https://visco.onrender.com";

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.remove("opacity-0");
  t.classList.add("opacity-100");

  setTimeout(()=>{
    t.classList.add("opacity-0");
  },2000);
}

// LOGIN
document.getElementById("loginForm").addEventListener("submit", async (e)=>{
  e.preventDefault();

  const btn = document.getElementById("loginBtn");
  btn.innerText = "Logging in...";
  btn.disabled = true;

  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  try{
    const res = await fetch(API + "/login-phone",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name, phone, password })
    });

    const data = await res.json();

    if(res.ok){
      localStorage.setItem("token", data.token || "user");
      showToast("Login Successful 🚀");
      setTimeout(()=> window.location.href="homepage.html", 1200);
    }else{
      showToast(data.message || "Login Failed");
    }

  }catch(err){
    showToast("Network Error");
  }

  btn.innerText = "Login";
  btn.disabled = false;
});

// SIGNUP
async function signup(){
  const name = document.getElementById("name").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const password = document.getElementById("password").value.trim();

  if(!name || !phone || !password){
    showToast("Fill all fields");
    return;
  }

  try{
    const res = await fetch(API + "/signup-phone",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ name, phone, password })
    });

    const data = await res.json();

    if(res.ok){
      showToast("Account Created 🚀 Now Login");
    }else{
      showToast(data.message || "Signup Failed");
    }

  }catch(err){
    showToast("Server Error");
  }
}

// GUEST
function guestMode(){
  localStorage.setItem("guest","true");
  showToast("Guest Mode Activated");
  setTimeout(()=>window.location.href="homepage.html",1000);
}

</script>

</body>
</html>
